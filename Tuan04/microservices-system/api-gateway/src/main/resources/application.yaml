server:
  port: 8090

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/users/**

  application:
    name: api-gateway

app:
  jwt:
    secret: ${JWT_SECRET}
