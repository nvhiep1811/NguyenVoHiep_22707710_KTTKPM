server {
  listen 80;
  server_name _;

  # Docker embedded DNS so nginx can resolve service names when proxy_pass uses
  # variables (e.g. $request_uri). 127.0.0.11 is the Docker daemon resolver.
  resolver 127.0.0.11 valid=30s;
  resolver_timeout 5s;

  # Basic proxy settings
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location ~ ^/api/([^/]+)(/.*)?$ {
    set $svc $1;
    # route based on first path segment after /api
    if ($svc = "users") {
      proxy_pass http://user-service:8081$request_uri;
      break;
    }
    if ($svc = "movies") {
      proxy_pass http://movie-service:8082$request_uri;
      break;
    }
    if ($svc = "bookings") {
      proxy_pass http://booking-service:8085$request_uri;
      break;
    }
    if ($svc = "payments") {
      proxy_pass http://payment-service:8083$request_uri;
      break;
    }
    if ($svc = "notifications") {
      proxy_pass http://notification-service:8084$request_uri;
      break;
    }
    if ($svc = "events") {
      proxy_pass http://notification-service:8084$request_uri;
      break;
    }
    return 502;
  }

  location = /health {
    add_header Content-Type text/plain;
    return 200 "api-gateway ok\n";
  }

  # Frontend fallback. This lets http://localhost:8080 serve the full app,
  # while /api/... continues to proxy to backend services.
  location / {
    proxy_pass http://frontend:80;
  }
}
