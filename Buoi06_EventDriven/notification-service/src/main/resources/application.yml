server:
  port: ${NOTIFICATION_SERVER_PORT:${SERVER_PORT:8084}}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: notification-service
  data:
    mongodb:
      uri: ${NOTIFICATION_MONGODB_URI:${MONGODB_URI:mongodb://localhost:27017/notification_db}}
      auto-index-creation: true
  kafka:
    bootstrap-servers: ${NOTIFICATION_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}
    consumer:
      group-id: ${NOTIFICATION_KAFKA_CONSUMER_GROUP:${KAFKA_CONSUMER_GROUP:notification-service}}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  kafka:
    topics:
      booking-created: ${TOPIC_BOOKING_CREATED:BOOKING_CREATED}
      payment-completed: ${TOPIC_PAYMENT_COMPLETED:PAYMENT_COMPLETED}
      booking-failed: ${TOPIC_BOOKING_FAILED:BOOKING_FAILED}
