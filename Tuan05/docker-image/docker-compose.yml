version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_USER: hiep
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: hiepdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

      - ./db/init:/docker-entrypoint-initdb.d

      - ./db/backup:/backup

volumes:
  postgres_data: