server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins:
              - ${FRONTEND_ORIGIN_LAN:http://192.168.1.14:3000}
              - ${FRONTEND_ORIGIN_LOCAL:http://localhost:3000}
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - '*'
            allow-credentials: true
      routes:
        - id: auth-route
          uri: ${USER_FOOD_SERVICE_URL:http://192.168.1.11:8081}
          predicates:
            - Path=/api/auth/**
        - id: users-route
          uri: ${USER_FOOD_SERVICE_URL:http://192.168.1.11:8081}
          predicates:
            - Path=/api/users/**
        - id: foods-route
          uri: ${USER_FOOD_SERVICE_URL:http://192.168.1.11:8081}
          predicates:
            - Path=/api/foods/**
        - id: orders-route
          uri: ${ORDER_SERVICE_URL:http://192.168.1.12:8082}
          predicates:
            - Path=/api/orders/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
