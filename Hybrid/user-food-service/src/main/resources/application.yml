server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8081}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: user-food-service
  data:
    mongodb:
      uri: ${USER_FOOD_MONGODB_URI:mongodb+srv://USER:PASS@CLUSTER/food_delivery_user_food_db?retryWrites=true&w=majority}
      auto-index-creation: true

app:
  jwt:
    secret: ${JWT_SECRET:food-delivery-demo-secret-key-change-me-32}
    expiration-ms: 86400000
